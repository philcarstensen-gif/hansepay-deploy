<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HansePay Insights</title>
<meta name="description" content="In-depth FX analysis and treasury guidance from HansePay." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
<style>
:root {
  --n900:#060D1A;--n800:#0B1929;--n700:#0F2540;--n600:#163659;
  --n500:#1E4E80;--n400:#2E6BAD;--n300:#3B7BC4;--n200:#8DBDE6;
  --n100:#C4DDEF;--n050:#EBF4FB;--off:#F5F1EA;--gold:#C9A961;
  --ink:#0B1929;--ink2:#3D5A73;--ink3:#7A9AB0;
  --font-ui:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  --font-display:'Playfair Display',Georgia,serif;
  --r-pill:100px;--r-lg:16px;--r-md:10px;--r-sm:6px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font-ui);color:var(--ink);background:#fff;-webkit-font-smoothing:antialiased;line-height:1.6;overflow-x:hidden}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}

/* ── NAV ── */
nav{position:sticky;top:0;left:0;right:0;z-index:200;padding:0 clamp(20px,5vw,80px);height:68px;display:flex;align-items:center;background:rgba(255,255,255,.97);box-shadow:0 1px 0 rgba(11,25,41,.08);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.nav-inner{max-width:1240px;margin:0 auto;width:100%;display:flex;align-items:center}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0;margin-right:40px}
.nav-logo-text{font-family:var(--font-display);font-size:20px;font-weight:600;letter-spacing:-.02em;color:var(--n800);line-height:1}
.nav-links{display:flex;align-items:stretch;gap:0;list-style:none;flex:1;height:68px}
.nav-item{position:relative;display:flex;align-items:center}
.nav-link{display:flex;align-items:center;font-size:14px;font-weight:500;color:rgba(11,25,41,.62);transition:color .15s;white-space:nowrap;padding:0 16px;height:100%;cursor:pointer;text-decoration:none}
.nav-link:hover{color:var(--n700)}
.nav-right{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
.nav-cta{background:var(--n800);color:#fff;border:none;padding:9px 22px;font-size:13px;font-weight:600;border-radius:var(--r-pill);text-decoration:none;transition:background .18s;display:inline-flex;align-items:center}
.nav-cta:hover{background:var(--n700)}
.nav-burger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:6px;border:none;background:none;margin-left:12px}
.nav-burger span{display:block;width:22px;height:2px;border-radius:2px;background:var(--n700);transition:all .22s ease}
.nav-burger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.nav-burger.open span:nth-child(2){opacity:0;transform:scaleX(0)}
.nav-burger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
.mobile-menu{display:none;position:fixed;top:68px;left:0;right:0;background:rgba(11,25,41,.97);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.07);padding:24px clamp(20px,5vw,80px);z-index:199;flex-direction:column;gap:4px}
.mobile-menu.open{display:flex}
.mobile-menu-link{font-size:16px;font-weight:500;color:rgba(255,255,255,.75);padding:12px 0;border-bottom:1px solid rgba(255,255,255,.07);text-decoration:none}
.mobile-menu-link:last-of-type{border-bottom:none}
.mobile-menu-cta{margin-top:16px;display:inline-flex;align-items:center;padding:12px 24px;background:var(--n500);color:#fff;border-radius:var(--r-pill);font-weight:600;font-size:14px}
@media(max-width:768px){.nav-links{display:none}.nav-burger{display:flex}}

/* ── ARTICLE HERO ── */
.article-hero{background:var(--n800);padding:72px 0 64px;position:relative;overflow:hidden}
.article-hero::before{content:'';position:absolute;inset:0;pointer-events:none;
  background-image:radial-gradient(rgba(141,189,230,.04) 1px,transparent 1px);
  background-size:28px 28px}
.article-hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:rgba(255,255,255,.06)}
.article-hero-inner{max-width:860px;margin:0 auto;padding:0 clamp(20px,5vw,80px);position:relative;z-index:1}
.article-cat-pill{display:inline-flex;align-items:center;padding:5px 14px;border-radius:var(--r-pill);border:1.5px solid var(--gold);color:var(--gold);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:22px}
.article-hero h1{font-family:var(--font-display);font-size:clamp(32px,5vw,52px);font-weight:400;line-height:1.1;letter-spacing:-.02em;color:#fff;margin-bottom:20px;max-width:760px}
.article-excerpt{font-size:17px;color:rgba(255,255,255,.68);line-height:1.7;margin-bottom:28px;max-width:640px}
.article-meta{display:flex;align-items:center;gap:12px;font-size:13px;color:rgba(255,255,255,.45);flex-wrap:wrap}
.article-meta-author{color:rgba(255,255,255,.8);font-weight:600}
.article-meta-sep{width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,.3);flex-shrink:0}

/* ── ARTICLE LAYOUT ── */
.article-layout{display:grid;grid-template-columns:1fr 220px;gap:64px;max-width:1060px;margin:0 auto;padding:56px clamp(20px,5vw,80px) 80px;align-items:start}
@media(max-width:860px){
  .article-layout{grid-template-columns:1fr;gap:0}
  .article-sidebar{order:2;margin-top:48px}
}

/* ── ARTICLE BODY ── */
.article-body{max-width:720px}
.article-body p{font-size:18px;line-height:1.8;color:var(--ink);margin-bottom:1.5em}
.article-body h2{font-family:var(--font-display);font-size:28px;font-weight:400;color:var(--ink);line-height:1.2;margin:2.2em 0 .8em;letter-spacing:-.01em}
.article-body h3{font-family:var(--font-ui);font-size:20px;font-weight:600;color:var(--ink);line-height:1.3;margin:1.8em 0 .6em}
.article-body h4{font-family:var(--font-ui);font-size:17px;font-weight:600;color:var(--ink);margin:1.5em 0 .5em}
.article-body blockquote{border-left:3px solid var(--gold);padding-left:1.5rem;margin:2em 0;color:var(--ink2);font-style:italic;font-size:17px;line-height:1.75}
.article-body pre{background:var(--n050);border:1px solid rgba(11,25,41,.08);border-radius:var(--r-md);padding:20px 24px;overflow-x:auto;margin:1.5em 0}
.article-body code{font-family:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace;font-size:14px}
.article-body p code,.article-body li code{background:var(--n050);border-radius:var(--r-sm);padding:2px 7px;font-size:13px;color:var(--n600)}
.article-body strong{color:var(--ink);font-weight:600}
.article-body em{font-style:italic}
.article-body a{color:var(--n400);text-decoration:none}
.article-body a:hover{text-decoration:underline}
.article-body ul,.article-body ol{margin:1em 0 1.5em 1.4em;font-size:18px;line-height:1.8;color:var(--ink)}
.article-body li{margin-bottom:.4em}
.article-body img{border-radius:var(--r-md);margin:2em 0;max-width:100%}
.article-body hr{border:none;border-top:1px solid rgba(11,25,41,.1);margin:3em 0}
.article-body table{width:100%;border-collapse:collapse;font-size:15px;margin:1.5em 0}
.article-body th{background:var(--n050);font-weight:600;text-align:left;padding:10px 14px;font-size:13px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink2);border-bottom:1px solid rgba(11,25,41,.1)}
.article-body td{padding:10px 14px;border-bottom:1px solid rgba(11,25,41,.06);color:var(--ink2)}

/* ── SIDEBAR ── */
.article-sidebar{position:sticky;top:96px}
.sidebar-card{background:#fff;border:1.5px solid rgba(11,25,41,.09);border-radius:var(--r-lg);padding:24px;box-shadow:0 2px 12px rgba(11,25,41,.06)}
.sidebar-label{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);margin-bottom:16px}
.share-btn{display:flex;align-items:center;gap:8px;width:100%;padding:10px 14px;border-radius:var(--r-md);font-size:13px;font-weight:600;color:var(--ink2);background:var(--n050);border:1px solid rgba(11,25,41,.08);cursor:pointer;transition:all .18s;font-family:var(--font-ui);margin-bottom:8px}
.share-btn:hover{background:var(--n100);color:var(--n500)}
.share-btn svg{flex-shrink:0}
.back-link{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--n400);margin-top:16px;padding-top:16px;border-top:1px solid rgba(11,25,41,.07);text-decoration:none;transition:color .18s}
.back-link:hover{color:var(--n500)}

/* ── RELATED POSTS ── */
.related-section{background:var(--n050);padding:64px 0}
.related-inner{max-width:1200px;margin:0 auto;padding:0 clamp(20px,5vw,80px)}
.related-label{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);margin-bottom:8px}
.related-heading{font-family:var(--font-display);font-size:clamp(24px,2.5vw,32px);font-weight:400;color:var(--ink);margin-bottom:36px;letter-spacing:-.01em}
.related-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
@media(max-width:860px){.related-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.related-grid{grid-template-columns:1fr}}

.related-card{background:#fff;border:1px solid rgba(11,25,41,.08);border-radius:var(--r-lg);overflow:hidden;box-shadow:0 2px 10px rgba(11,25,41,.05);transition:transform .22s,box-shadow .22s;display:flex;flex-direction:column;text-decoration:none;color:inherit}
.related-card:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(11,25,41,.12)}
.related-card-image{height:160px;position:relative;overflow:hidden;flex-shrink:0}
.related-card-image img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.related-card-body{padding:20px;flex:1;display:flex;flex-direction:column}
.related-tag{display:inline-flex;align-items:center;padding:3px 10px;border-radius:var(--r-pill);background:var(--n050);color:var(--n500);font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;width:fit-content}
.related-card-title{font-family:var(--font-display);font-size:16px;font-weight:400;line-height:1.35;color:var(--ink);margin-bottom:8px;flex:1}
.related-card-meta{font-size:11px;color:var(--ink3)}

/* ── 404 STATE ── */
.not-found{text-align:center;padding:100px 20px}
.not-found h1{font-family:var(--font-display);font-size:36px;font-weight:400;color:var(--ink);margin-bottom:12px}
.not-found p{font-size:16px;color:var(--ink2);margin-bottom:28px}
.not-found a{display:inline-flex;align-items:center;gap:6px;padding:11px 24px;background:var(--n500);color:#fff;border-radius:var(--r-pill);font-size:14px;font-weight:600;transition:background .18s}
.not-found a:hover{background:var(--n600)}

/* ── FOOTER ── */
footer{background:var(--n800);padding:36px 0}
.footer-inner{max-width:1200px;margin:0 auto;padding:0 clamp(20px,5vw,80px);display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap}
.footer-copy{font-size:13px;color:rgba(255,255,255,.42)}
.footer-links{display:flex;gap:24px}
.footer-links a{font-size:13px;color:rgba(255,255,255,.42);transition:color .18s}
.footer-links a:hover{color:rgba(255,255,255,.82)}

/* ── GRADIENT HELPERS ── */
.grad-fx{background:linear-gradient(135deg,#0F2540,#1E4E80)}
.grad-treasury{background:linear-gradient(135deg,#163659,#2E6BAD)}
.grad-compliance{background:linear-gradient(135deg,#0B1929,#163659)}
.grad-market{background:linear-gradient(135deg,#1E4E80,#3B7BC4)}
.grad-default{background:linear-gradient(135deg,#0F2540,#2E6BAD)}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-inner">
    <a href="/hansepay/" class="nav-logo">
      <span class="nav-logo-text">HansePay</span>
    </a>
    <ul class="nav-links">
      <li class="nav-item"><a href="/hansepay/#platform" class="nav-link">Platform</a></li>
      <li class="nav-item"><a href="/hansepay/#currencies" class="nav-link">Currencies</a></li>
      <li class="nav-item"><a href="/hansepay/#calculator" class="nav-link">Pricing</a></li>
      <li class="nav-item"><a href="/hansepay/blog.html" class="nav-link">Insights</a></li>
    </ul>
    <div class="nav-right">
      <a href="/hansepay/#cta" class="nav-cta">Get started</a>
    </div>
    <button class="nav-burger" id="navBurger" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<div class="mobile-menu" id="mobileMenu">
  <a href="/hansepay/#platform" class="mobile-menu-link">Platform</a>
  <a href="/hansepay/#currencies" class="mobile-menu-link">Currencies</a>
  <a href="/hansepay/#calculator" class="mobile-menu-link">Pricing</a>
  <a href="/hansepay/blog.html" class="mobile-menu-link">Insights</a>
  <a href="/hansepay/#cta" class="mobile-menu-cta">Get started</a>
</div>

<!-- ARTICLE HERO (populated by JS) -->
<div id="articleHero"></div>

<!-- ARTICLE BODY (populated by JS) -->
<div id="articleBody"></div>

<!-- RELATED POSTS (populated by JS) -->
<div id="relatedSection"></div>

<!-- FOOTER -->
<footer>
  <div class="footer-inner">
    <span class="footer-copy">&copy; 2025 HansePay GmbH &middot; Hamburg</span>
    <nav class="footer-links">
      <a href="/hansepay/privacy">Privacy</a>
      <a href="/hansepay/imprint">Imprint</a>
    </nav>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
(function () {
  /* ── utilities ── */
  function esc(s) {
    if (s == null) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function fmtDate(s) {
    if (!s) return '';
    const d = new Date(s);
    if (isNaN(d)) return String(s);
    return d.toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
  }

  function catGrad(cat) {
    const m = { 'FX Education':'grad-fx', 'Treasury':'grad-treasury', 'Compliance':'grad-compliance', 'Market Analysis':'grad-market' };
    return m[cat] || 'grad-default';
  }

  function getSlug() {
    const params = new URLSearchParams(window.location.search);
    if (params.get('slug')) return params.get('slug');
    // fallback: last path segment without extension
    const parts = window.location.pathname.split('/').filter(Boolean);
    const last = parts[parts.length - 1];
    return last && last !== 'blog-post.html' ? last : null;
  }

  /* ── mobile menu ── */
  const burger = document.getElementById('navBurger');
  const mm = document.getElementById('mobileMenu');
  burger.addEventListener('click', () => {
    burger.classList.toggle('open');
    mm.classList.toggle('open');
  });

  /* ── render article hero ── */
  function renderHero(post) {
    document.getElementById('articleHero').innerHTML = `
      <section class="article-hero">
        <div class="article-hero-inner">
          <span class="article-cat-pill">${esc(post.category || 'Insights')}</span>
          <h1>${esc(post.title)}</h1>
          ${post.excerpt ? `<p class="article-excerpt">${esc(post.excerpt)}</p>` : ''}
          <div class="article-meta">
            <span class="article-meta-author">${esc(post.author || 'HansePay Editorial')}</span>
            <span class="article-meta-sep"></span>
            <span>${esc(post.readTime || '5 min read')}</span>
            <span class="article-meta-sep"></span>
            <span>${fmtDate(post.publishedAt || post.date)}</span>
          </div>
        </div>
      </section>`;
    document.title = `${post.title} — HansePay Insights`;
  }

  /* ── render article body ── */
  function renderBody(post) {
    let bodyHTML = '';
    if (post.content) {
      if (typeof marked !== 'undefined') {
        marked.setOptions({ breaks: true, gfm: true });
        bodyHTML = marked.parse(post.content);
      } else {
        // plain text fallback
        bodyHTML = `<p>${esc(post.content).replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>')}</p>`;
      }
    }

    document.getElementById('articleBody').innerHTML = `
      <div class="article-layout">
        <article class="article-body" id="articleContent">${bodyHTML || '<p>No content available.</p>'}</article>
        <aside class="article-sidebar">
          <div class="sidebar-card">
            <p class="sidebar-label">Share</p>
            <button class="share-btn" id="copyLinkBtn">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5.5 7.5a3 3 0 004.243 0l1.5-1.5a3 3 0 00-4.243-4.243l-.856.857" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M8.5 6.5a3 3 0 00-4.243 0l-1.5 1.5a3 3 0 004.243 4.243l.856-.857" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
              Copy link
            </button>
            <a href="https://twitter.com/intent/tweet?url=${encodeURIComponent(window.location.href)}&text=${encodeURIComponent(post.title)}" target="_blank" rel="noopener" class="share-btn" style="text-decoration:none;display:flex">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M13 2.5a5.5 5.5 0 01-1.65.452 2.89 2.89 0 001.265-1.593 5.79 5.79 0 01-1.828.698A2.883 2.883 0 007 4.033c0 .226.025.446.076.657A8.19 8.19 0 011.1 1.641a2.88 2.88 0 00-.39 1.452c0 1 .51 1.88 1.285 2.397a2.87 2.87 0 01-1.305-.36v.036a2.887 2.887 0 002.313 2.83 2.9 2.9 0 01-1.302.049 2.885 2.885 0 002.693 2.003A5.786 5.786 0 011 10.955a8.168 8.168 0 004.418 1.296c5.3 0 8.2-4.39 8.2-8.2 0-.124-.003-.248-.008-.37A5.852 5.852 0 0014.9 2.05 5.73 5.73 0 0113 2.5z" fill="currentColor"/></svg>
              Share on X
            </a>
            <a href="/hansepay/blog.html" class="back-link">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M8.5 3L5 7l3.5 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
              Back to Insights
            </a>
          </div>
        </aside>
      </div>`;

    document.getElementById('copyLinkBtn').addEventListener('click', () => {
      navigator.clipboard.writeText(window.location.href).then(() => {
        const btn = document.getElementById('copyLinkBtn');
        const prev = btn.innerHTML;
        btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2.5 7l3 3 6-6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg> Copied!`;
        setTimeout(() => { btn.innerHTML = prev; }, 2000);
      });
    });
  }

  /* ── render related posts ── */
  function renderRelated(posts, currentSlug, currentCategory) {
    let candidates = posts.filter(p => p.slug !== currentSlug);
    // same category first
    const sameCat = candidates.filter(p => p.category === currentCategory);
    const others = candidates.filter(p => p.category !== currentCategory);
    const related = [...sameCat, ...others].slice(0, 3);

    if (!related.length) return;

    function relatedCardHTML(p) {
      const grad = catGrad(p.category);
      const img = p.featuredImage
        ? `<img src="${esc(p.featuredImage)}" alt="${esc(p.title)}" loading="lazy" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0">`
        : '';
      return `
        <a href="/hansepay/blog-post.html?slug=${esc(p.slug)}" class="related-card">
          <div class="related-card-image ${grad}">${img}</div>
          <div class="related-card-body">
            <span class="related-tag">${esc(p.category || 'Insights')}</span>
            <h3 class="related-card-title">${esc(p.title)}</h3>
            <p class="related-card-meta">${esc(p.readTime || '5 min read')} &middot; ${fmtDate(p.publishedAt || p.date)}</p>
          </div>
        </a>`;
    }

    document.getElementById('relatedSection').innerHTML = `
      <section class="related-section">
        <div class="related-inner">
          <p class="related-label">More from HansePay</p>
          <h2 class="related-heading">More from HansePay Insights</h2>
          <div class="related-grid">${related.map(relatedCardHTML).join('')}</div>
        </div>
      </section>`;
  }

  /* ── show 404 ── */
  function show404() {
    document.getElementById('articleHero').innerHTML = '';
    document.getElementById('articleBody').innerHTML = `
      <div class="not-found">
        <h1>Article not found</h1>
        <p>This article may have been moved or no longer exists.</p>
        <a href="/hansepay/blog.html">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M8.5 3L5 7l3.5 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Back to Insights
        </a>
      </div>`;
    document.getElementById('relatedSection').innerHTML = '';
    document.title = 'Article Not Found — HansePay Insights';
  }

  /* ── main ── */
  async function init() {
    const slug = getSlug();

    if (!slug) {
      show404();
      return;
    }

    let post;
    try {
      const res = await fetch(`/api/posts/${encodeURIComponent(slug)}`);
      if (res.status === 404) { show404(); return; }
      if (!res.ok) throw new Error('HTTP ' + res.status);
      post = await res.json();
    } catch (err) {
      console.error(err);
      show404();
      return;
    }

    renderHero(post);
    renderBody(post);

    // load all posts for related section
    try {
      const allRes = await fetch('/api/posts');
      if (allRes.ok) {
        const data = await allRes.json();
        const allPosts = Array.isArray(data) ? data : (data.posts || []);
        renderRelated(allPosts, post.slug, post.category);
      }
    } catch (_) {
      // related posts are non-critical, fail silently
    }
  }

  document.addEventListener('DOMContentLoaded', init);
})();
</script>
</body>
</html>
